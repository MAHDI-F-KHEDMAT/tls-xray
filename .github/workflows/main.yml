name: Yekyek Reality Sorter

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  sort:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download and Setup Xray-core
        run: |
          # دانلود آخرین نسخه رسمی لینوکس 64 بیت هسته Xray
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip xray.zip xray
          chmod +x xray
          echo "Xray-core downloaded and activated successfully."

      - name: Run Sorter
        run: python yekyek.py

      - name: Push Results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          # اضافه کردن پوشه داده‌ها که اسکریپت پایتون آن را می‌سازد
          git add data/
          git commit -m "Update reality configs via Xray-core validation" || exit 0
          git push
